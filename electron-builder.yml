appId: com.orzu.app
productName: OrzuHypothesis
directories:
  output: dist
  buildResources: build
files:
  - out/**/*
  - resources/**/*
  - package.json
  # 1. ПРИНУДИТЕЛЬНО ВКЛЮЧАЕМ СКРЫТУЮ ПАПКУ PRISMA В СБОРКУ
  - "node_modules/.prisma/**/*"

extraResources:
  - ".env"

# 2. ДОСТАЕМ PRISMA ИЗ АРХИВА, ЧТОБЫ ЕЁ ДВИЖКИ МОГЛИ РАБОТАТЬ
asarUnpack:
  - "node_modules/.prisma/**/*"
  - "node_modules/@prisma/client/**/*"

publish:
  provider: github

win:
  executableName: hypothesis
  target:
    - nsis-web

nsisWeb:
  artifactName: ${productName}-WebSetup.${ext}
  shortcutName: ${productName}
  uninstallDisplayName: ${productName}
  createDesktopShortcut: always
  allowToChangeInstallationDirectory: false

mac:
  target:
    - target: dmg
      arch:
        - x64
        - arm64
  artifactName: ${productName}-${version}-${arch}.${ext}