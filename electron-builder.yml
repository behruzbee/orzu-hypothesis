appId: com.orzu.app
productName: OrzuHypothesis
directories:
  output: dist
  buildResources: build
files:
  - out/**/*
  - resources/**/*
  - package.json

# Указываем GitHub как место хранения файлов
publish:
  provider: github

win:
  executableName: hypothesis
  target:
    - nsis-web # ВОТ ОН: Сетевой установщик

nsisWeb:
  artifactName: ${productName}-WebSetup.${ext} # Это будет файл на 2-5 МБ
  shortcutName: ${productName}
  uninstallDisplayName: ${productName}
  createDesktopShortcut: always
  allowToChangeInstallationDirectory: true

# Для Mac оставляем обычный DMG
mac:
  target:
    - dmg
  artifactName: ${productName}-${version}.${ext}