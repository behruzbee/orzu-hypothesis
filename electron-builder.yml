appId: com.orzu.app
productName: OrzuHypothesis
directories:
  output: dist
  buildResources: build
files:
  - out/**/*
  - resources/**/*
  - package.json

# Прячем файл .env внутрь собранного приложения
extraResources:
  - ".env"

# Настройка публикации в GitHub для автообновлений
publish:
  provider: github

# WINDOWS
win:
  executableName: hypothesis
  target:
    - nsis-web

nsisWeb:
  artifactName: ${productName}-WebSetup.${ext}
  shortcutName: ${productName}
  uninstallDisplayName: ${productName}
  createDesktopShortcut: always
  allowToChangeInstallationDirectory: false

# MAC (Собираем сразу под Intel и под M1/M2/M3)
mac:
  target:
    - target: dmg
      arch:
        - x64
        - arm64
  # В названии файла появится архитектура (например: OrzuHypothesis-1.0.4-arm64.dmg)
  artifactName: ${productName}-${version}-${arch}.${ext}